services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: weather-minio
    restart: no
    networks:
      - weather-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mioadmin}
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
