services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: no
    networks:
      - weather-net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/weather-init.sql:/docker-entrypoint-initdb.d/weather-init.sql
      - ./metadata-init/airflow-init.sql:/docker-entrypoint-initdb.d/airflow-init.sql
      - ./metadata-init/metabase-init.sql:/docker-entrypoint-initdb.d/metabase-init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s
