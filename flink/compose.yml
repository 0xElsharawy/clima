services:
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    image: weather-pyflink
    container_name: jobmanager
    env_file:
      - .env.flink
    networks:
      - weather-net
    restart: no
    pull_policy: never
    expose:
      - "6123"
    ports:
      - "8082:8081" # Web UI
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    command: jobmanager
    environment:
      KAFKA_TOPIC: ${KAFKA_TOPIC:-weather_raw}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m

  taskmanager:
    image: weather-pyflink
    container_name: taskmanager
    networks:
      - weather-net
    restart: no
    pull_policy: never
    expose:
      - "6121"
      - "6122"
    depends_on:
      - jobmanager
    command: ["taskmanager", "--taskmanager.registration.timeout", "300s"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://jobmanager:8081/taskmanagers"]
      interval: 10s
      timeout: 5s
      retries: 10

  job-submitter:
    image: weather-pyflink
    container_name: job-submitter
    networks:
      - weather-net
    pull_policy: never
    depends_on:
      taskmanager:
        condition: service_healthy
    command:
      [
        "bash",
        "-c",
        "./bin/flink run -m jobmanager:8081 -py /opt/src/consumer_job.py --pyFiles /opt/src -d",
      ]
    volumes:
      - ./src/:/opt/src
      - ./flink-config.yaml:/opt/flink/conf/config.yaml
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        rest.port: 8081
