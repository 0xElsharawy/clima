services:
  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    image: weather-pyflink
    container_name: flink-jobmanager
    env_file:
      - ../.env
    networks:
      - weather-net
    restart: no
    pull_policy: never
    expose:
      - "6123"
    ports:
      - "8082:8081" # Web UI
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    command: jobmanager
    environment:
      KAFKA_TOPIC: ${KAFKA_TOPIC:-weather_raw}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address:jobmanager
        jobmanager.memory.process.size: 1600m

  flink-taskmanager:
    image: weather-pyflink
    container_name: flink-taskmanager
    networks:
      - weather-net
    restart: no
    pull_policy: never
    expose:
      - "6121"
      - "6122"
    depends_on:
      - flink-jobmanager
    command: ["taskmanager", "--taskmanager.registration.timeout", "300s"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address:jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
